; PlatformIO Project Configuration File
; Project Jarvis — M5Stack CoreS3 + M5Module-LLM
;
; Phase 1 (Hardware Validation) target: build/flash the bundled M5Module-LLM
; VoiceAssistant example via src/main.cpp. See PLAN.md and CLAUDE.md.

[platformio]
default_envs = cores3

[env:cores3]
platform = espressif32@6.13.0
board = m5stack-cores3
framework = arduino

; CoreS3 has 8MB OPI PSRAM — required for large JSON buffers (CLAUDE.md PSRAM rule).
board_build.arduino.memory_type = qio_opi
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17

build_unflags =
    -std=gnu++11

; LittleFS image hosts the Phase-config captive-portal UI (data/web/*).
; Default partition layout is too tight (~1.5 MB FS); default_16MB.csv
; splits the 16 MB flash into ~6 MB app + ~7 MB FS.
; Build / flash:
;   pio run --target upload      (firmware)
;   pio run --target uploadfs    (web UI in data/)
board_build.filesystem = littlefs
board_build.partitions = default_16MB.csv

monitor_speed = 115200
monitor_filters =
    esp32_exception_decoder
    time

; Pin both ports — pio's auto-detect picks the LLM Module's CH340 shell (COM3,
; VID 1A86) instead of the CoreS3 (COM9, Espressif VID 303A). Use the USB
; VID:PID filter so this survives port renumbering when the device re-enums.
upload_port = COM9
monitor_port = COM9
upload_speed = 921600

; OTA flashing (Phase 7) — uncomment these and set `upload_port =
; jarvis.local` (or the device IP) to push over WiFi via ArduinoOTA.
; Auth flag is required: OtaService enforces ota_pass from NVS. The
; env-var path mangles multi-flag input, so these belong here.
; Note: if Tailscale is up on the dev box and accepts 192.168.1.0/24
; routes, espota traffic gets poached — run `tailscale set
; --accept-routes=false` first. See plans/phase7-validation.md Gate 2.
;upload_protocol = espota
;upload_flags =
;    --auth=<ota_pass from NVS>
;    --host_port=8266

lib_deps =
    m5stack/M5CoreS3@^1.0.1
    m5stack/M5Module-LLM@^1.7.0
    bblanchon/ArduinoJson@^7.2.0
    ; ESP8266Audio: MP3 decoder used by hal/AudioPlayer to play cloud-TTS
    ; responses through M5.Speaker (PLAN.md Phase 7). The "ESP8266" in the
    ; name is historical — the lib supports ESP32 / ESP32-S3 too.
    earlephilhower/ESP8266Audio@^1.9.7
    ; PubSubClient: MQTT for Phase 7 — net/MqttClient publishes jarvis/state
    ; on every FSM transition and subscribes to jarvis/command. Tracks the
    ; HA Mosquitto add-on's authenticated-broker pattern.
    knolleary/PubSubClient@^2.8
    ; ESPAsyncWebServer + AsyncTCP: powers net/CaptivePortal — the HTTP
    ; server, schema-driven config UI, and WiFi provisioning at
    ; http://192.168.4.1/ when the device is in Config mode.
    esp32async/ESPAsyncWebServer@^3.6.0
    esp32async/AsyncTCP@^3.2.0
