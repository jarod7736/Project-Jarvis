; Jarvis - PlatformIO project config
; Target: M5Stack CoreS3 (ESP32-S3 with 16MB flash, 8MB PSRAM)

[env:m5stack-cores3]
platform  = espressif32
board     = m5stack-cores3
framework = arduino

; Filesystem: LittleFS (not the default SPIFFS).
; Files in ./data/ get packed into a littlefs image and flashed
; to the partition labeled "spiffs" in the partition table.
board_build.filesystem = littlefs

; Use the 16MB partition layout that ships with the espressif32 platform.
; This gives ~6MB for app + ~7MB for filesystem, plenty for our ~30KB UI.
board_build.partitions = default_16MB.csv

; ESP32-S3 USB CDC -- so Serial.print() works over the native USB port
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=3
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE

; Higher upload speed makes the dev cycle bearable on 16MB flash
upload_speed  = 1500000
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

lib_deps =
    m5stack/M5Unified@^0.2.0
    m5stack/M5GFX@^0.2.0
    bblanchon/ArduinoJson@^7.0.0
    esp32async/ESPAsyncWebServer@^3.6.0
    esp32async/AsyncTCP@^3.2.0
    lvgl/lvgl@^8.4.0

; ---------------------------------------------------------------------------
; To build & flash everything:
;   pio run --target upload          (firmware)
;   pio run --target uploadfs        (web UI files in data/)
;
; To monitor serial:
;   pio device monitor
; ---------------------------------------------------------------------------
